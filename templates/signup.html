<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <line x1="19" y1="8" x2="19" y2="14"/>
                    <line x1="22" y1="11" x2="16" y2="11"/>
                </svg>
            </div>

            <h1>Create Account</h1>
            <p class="auth-subtitle">Sign up to start managing your tasks</p>

            <div id="auth-error" class="auth-error"></div>

            <form onsubmit="handleSignUp(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Choose a username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="repeated-password">Confirm Password</label>
                    <input type="password" id="repeated-password" placeholder="Repeat your password" autocomplete="new-password">
                </div>
                <button type="submit" class="auth-btn" data-label="Sign Up">Sign Up</button>
            </form>

            <div class="auth-divider"><span>or</span></div>

            <p class="auth-footer">Already have an account? <a href="/signin-page">Sign In</a></p>
        </div>
    </div>
    <script src="/static/js/auth.js"></script>
</body>
</html>
