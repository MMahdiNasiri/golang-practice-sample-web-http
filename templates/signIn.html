<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>

            <h1>Welcome Back</h1>
            <p class="auth-subtitle">Sign in to your account</p>

            <div id="auth-error" class="auth-error"></div>

            <form onsubmit="handleSignIn(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                </div>
                <button type="submit" class="auth-btn" data-label="Sign In">Sign In</button>
            </form>

            <div class="auth-divider"><span>or</span></div>

            <p class="auth-footer">Don't have an account? <a href="/signup-page">Sign Up</a></p>
        </div>
    </div>
    <script src="/static/js/auth.js"></script>
</body>
</html>
