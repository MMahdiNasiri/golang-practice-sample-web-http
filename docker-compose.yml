version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      - TZ=UTC
    networks:
      - app-network
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      sentinel-1:
        condition: service_started
      sentinel-2:
        condition: service_started
      sentinel-3:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: app-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis-replica:
    image: redis:7-alpine
    container_name: app-redis-replica
    restart: unless-stopped
    command: >
      redis-server
      --replicaof redis 6379
      --appendonly yes
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "6380:6379"
    networks:
      - app-network

  postgres:
    image: postgres:15
    container_name: todo-app-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-tododb}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-tododb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4
    container_name: todo-app-pgadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      - app-network
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-password}
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:80/misc/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  sentinel-1:
    image: redis:7-alpine
    command: >
      sh -c "cp /etc/redis/sentinel-template.conf /tmp/sentinel.conf && 
             redis-sentinel /tmp/sentinel.conf"
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel-template.conf:ro

    ports:
      - "26379:26379"
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy

  sentinel-2:
    image: redis:7-alpine
    command: >
      sh -c "cp /etc/redis/sentinel-template.conf /tmp/sentinel.conf && 
             redis-sentinel /tmp/sentinel.conf"
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel-template.conf:ro
    ports:
      - "26380:26379"
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy

  sentinel-3:
    image: redis:7-alpine
    command: >
      sh -c "cp /etc/redis/sentinel-template.conf /tmp/sentinel.conf && 
             redis-sentinel /tmp/sentinel.conf"
      volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel-template.conf:ro
    ports:
      - "26381:26379"
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy

networks:
  app-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
